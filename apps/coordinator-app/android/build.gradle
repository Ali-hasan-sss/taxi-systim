// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
        classpath 'com.google.gms:google-services:4.4.1'
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

subprojects { sub ->
  sub.afterEvaluate {
    def androidExt = sub.extensions.findByName("android")
    if (androidExt == null) return
    try {
      def defaultConfig = androidExt.defaultConfig
      def cmake = defaultConfig?.externalNativeBuild?.cmake
      if (cmake == null) return
      def args = cmake.arguments?.toList() ?: []
      if (!args.any { it.toString().contains("CMAKE_OBJECT_PATH_MAX") }) {
        cmake.arguments args + ["-DCMAKE_OBJECT_PATH_MAX=1024"]
      }
    } catch (Throwable ignored) {
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// NDK 27.x غير مثبت — استخدم الإصدار المثبت عبر Android Studio
rootProject.ext.ndkVersion = "30.0.14904198"
