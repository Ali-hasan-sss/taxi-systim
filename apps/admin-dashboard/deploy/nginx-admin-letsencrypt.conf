# إنتاج: HTTPS بشهادة Let's Encrypt (موثوقة — لا تظهر «غير آمن» في المتصفح)
# النطاق: admintaxi.qmenussy.com → 127.0.0.1:3001 (PM2 / Next.js)
#
# === قبل النسخ ===
# 1) DNS: سجل A لـ admintaxi.qmenussy.com → IP الـ VPS (انتظر انتشار DNS، تحقق: ping admintaxi.qmenussy.com)
# 2) شغّل الداشبورد: pm2 status | grep taxi-admin  و curl -I http://127.0.0.1:3001
#
# === الحصول على الشهادة (مرة واحدة) — مهم لإزالة «غير آمن» ===
# الشهادة الذاتية تظل «غير آمن» في المتصفح. استخدم Let's Encrypt:
#
# أ) الطريقة الموصى بها (Certbot يعدّل الملف بنفسه):
#    sudo cp apps/admin-dashboard/deploy/nginx-admin-http-only.conf /etc/nginx/sites-available/taxi-admin
#    sudo ln -sf /etc/nginx/sites-available/taxi-admin /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#    sudo certbot --nginx -d admintaxi.qmenussy.com
#    بعد «Successfully deployed certificate» اترك /etc/nginx/sites-available/taxi-admin كما خرّجه Certbot.
#    لا تنسخ هذا الملف فوقه — ستحذف تعليقات Certbot وقد يتعطل التجديد.
#
# ب) هذا الملف (.conf) مرجع يدوي فقط (سيرفر جديد بدون certbot --nginx)، أو git pull على الجهاز المحلي.
#
# ج) تحقق من الشهادة:
#    sudo certbot certificates
#    sudo ls /etc/letsencrypt/live/admintaxi.qmenussy.com/
#
# === تثبيت يدوي بدون certbot --nginx (نادر) ===
#   sudo cp .../nginx-admin-letsencrypt.conf /etc/nginx/sites-available/taxi-admin
#   sudo ln -sf ... && sudo nginx -t && sudo systemctl reload nginx
#
# إن لم تكن ملفات options-ssl-nginx.conf موجودة بعد certbot، علّق السطرين include/ssl_dhparam أو شغّل certbot مرة كاملة.
#
# === تجديد تلقائي ===
#   sudo certbot renew --dry-run
#
# إن فشل nginx -t بسبب ssl_dhparam، علّق سطر ssl_dhparam أدناه أو نفّذ:
#   sudo openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048

upstream taxi_admin_nextjs {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name admintaxi.qmenussy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admintaxi.qmenussy.com;

    ssl_certificate     /etc/letsencrypt/live/admintaxi.qmenussy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admintaxi.qmenussy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # إن وُجد الملف فعّله (اختياري):
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://taxi_admin_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
