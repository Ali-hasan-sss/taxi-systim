# بروكسي HTTP فقط (بدون SSL) — admintaxi.qmenussy.com → Next.js على 3001
#
# sudo cp apps/admin-dashboard/deploy/nginx-admin-http-only.conf /etc/nginx/sites-available/taxi-admin
# sudo ln -sf /etc/nginx/sites-available/taxi-admin /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

upstream taxi_admin_nextjs {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name admintaxi.qmenussy.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://taxi_admin_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
