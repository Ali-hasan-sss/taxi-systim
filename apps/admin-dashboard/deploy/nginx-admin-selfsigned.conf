# عكس بروكسي Nginx لداشبورد الأدمن (Next.js) على admintaxi.qmenussy.com → 127.0.0.1:3001
#
# مسبقًا: سجّل A record للسب دومين admintaxi.qmenussy.com → IP الـ VPS.
#
# 1) شهادة ذاتية (مثل الباك): من جذر المستودع
#    sudo bash apps/api/deploy/gen-ssl-selfsigned.sh YOUR_VPS_IP
#    ثم انسخ أو أنشئ زوج شهادات لهذا السب دومين تحت /etc/nginx/ssl/
#    مثال: sudo cp /etc/nginx/ssl/taxi-api.crt /etc/nginx/ssl/admintaxi.crt
#          sudo cp /etc/nginx/ssl/taxi-api.key /etc/nginx/ssl/admintaxi.key
#    أو أنشئ شهادة SAN تغطي عدة أسماء (اختياري).
#
# 2) انسخ الملف:
#    sudo cp apps/admin-dashboard/deploy/nginx-admin-selfsigned.conf /etc/nginx/sites-available/taxi-admin
# 3) عدّل ssl_certificate و ssl_certificate_key إن لزم.
# 4) sudo ln -sf /etc/nginx/sites-available/taxi-admin /etc/nginx/sites-enabled/
# 5) sudo nginx -t && sudo systemctl reload nginx
#
# الأفضل للإنتاج — Let's Encrypt (نفس أسلوب certbot مع الباك):
#   sudo certbot --nginx -d admintaxi.qmenussy.com
# بعدها استبدل المسارات أدناه بـ:
#   ssl_certificate     /etc/letsencrypt/live/admintaxi.qmenussy.com/fullchain.pem;
#   ssl_certificate_key /etc/letsencrypt/live/admintaxi.qmenussy.com/privkey.pem;

upstream taxi_admin_nextjs {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name admintaxi.qmenussy.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admintaxi.qmenussy.com;

    ssl_certificate     /etc/nginx/ssl/admintaxi.crt;
    ssl_certificate_key /etc/nginx/ssl/admintaxi.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;

    location / {
        proxy_pass http://taxi_admin_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
