# عكس بروكسي Nginx لـ API (Express + Socket.IO) على السب دومين taxi.qmenussy.com.
#
# 1) قبل شهادة موثوقة: أنشئ شهادة ذاتية: sudo bash deploy/gen-ssl-selfsigned.sh YOUR_VPS_IP
# 2) انسخ هذا الملف: sudo cp deploy/nginx-api-selfsigned.conf /etc/nginx/sites-available/taxi-api
# 3) عدّل مسارات ssl_certificate إن وضعت الشهادات في مكان آخر.
# 4) sudo ln -s /etc/nginx/sites-available/taxi-api /etc/nginx/sites-enabled/
# 5) sudo nginx -t && sudo systemctl reload nginx
#
# ملاحظة: بما أن لديك دومين، الأفضل لاحقًا استبدال الشهادة الذاتية بـ Let's Encrypt:
# sudo certbot --nginx -d taxi.qmenussy.com

upstream taxi_api_backend {
    server 127.0.0.1:4001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name taxi.qmenussy.com;

    # إعادة توجيه كل HTTP إلى HTTPS (عطّل السطرين التاليين إن أردت HTTP فقط مؤقتًا)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name taxi.qmenussy.com;

    ssl_certificate     /etc/nginx/ssl/taxi-api.crt;
    ssl_certificate_key /etc/nginx/ssl/taxi-api.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # حدّ أقصى لحجم جسم الطلب (رفع صور إن وُجد لاحقًا)
    client_max_body_size 10M;

    location / {
        proxy_pass http://taxi_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass http://taxi_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
