# بروكسي HTTP فقط (بدون SSL) — للاختبار السريع على IP.
# استمع على المنفذ 80 ووجّه إلى API على 4000.
#
# sudo cp deploy/nginx-api-http-only.conf /etc/nginx/sites-available/taxi-api
# sudo ln -sf /etc/nginx/sites-available/taxi-api /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# التطبيقات تتصل بـ: http://YOUR_IP/api

upstream taxi_api_backend {
    server 127.0.0.1:4001;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10M;

    location / {
        proxy_pass http://taxi_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://taxi_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
